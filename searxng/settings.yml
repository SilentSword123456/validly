# SearXNG settings for Validly autonomous agent
# https://docs.searxng.org/admin/settings/settings.html
use_default_settings: true

general:
  debug: false
  instance_name: "Validly Search"

server:
  secret_key: "autonomous-agent-secret-key-change-me"
  # Allow internal services (crawler) to use SearXNG without rate limits
  limiter: false
  image_proxy: false
  bind_address: "0.0.0.0:8080"
  method: "POST"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  # Enable the JSON format so the crawler can query /search?format=json
  formats:
    - html
    - json

ui:
  static_use_hash: true
  default_theme: simple
