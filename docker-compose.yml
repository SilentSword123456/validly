services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: validly
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d validly"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - backend
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    networks:
      - backend
    environment:
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-autonomous-agent-secret-key-change-me}
      - SEARXNG_BIND_ADDRESS=0.0.0.0:8080
    volumes:
      - ./searxng:/etc/searxng
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://[::1]:8080/ > /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  crawler:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      searxng:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    networks:
      - backend
    environment:
      - POSTGRES_URL=${POSTGRES_URL:-postgresql://agent:agent@postgres:5432/validly}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:14b}
      - SEARXNG_URL=${SEARXNG_URL:-http://searxng:8080}
      - CRAWL_DELAY_SECONDS=${CRAWL_DELAY_SECONDS:-120}
      - SUBREDDIT_STALENESS_DAYS=${SUBREDDIT_STALENESS_DAYS:-3}
      - MAX_IDEAS_IN_DB=${MAX_IDEAS_IN_DB:-500}
      - DIGEST_HOUR=${DIGEST_HOUR:-8}
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python main.py' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  digest:
    build:
      context: ./digest
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    networks:
      - backend
    environment:
      - POSTGRES_URL=${POSTGRES_URL:-postgresql://agent:agent@postgres:5432/validly}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:14b}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - DIGEST_HOUR=${DIGEST_HOUR:-8}
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python main.py' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile.nextjs
    restart: unless-stopped
    ports:
      - "${NEXTJS_PORT:-3000}:3000"
    env_file:
      - path: .env.local
        required: false
    networks:
      - backend
      - public
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  # Shared network for all services — has outbound internet access
  # so the crawler can reach Reddit and SearXNG can reach the web.
  backend:
    driver: bridge
  # Separate network that bridges the Next.js app to the host
  public:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  ollama_data:
    driver: local
